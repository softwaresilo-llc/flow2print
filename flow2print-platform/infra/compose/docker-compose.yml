name: flow2print

x-node-service: &node-service
  build:
    context: ../..
    dockerfile: infra/docker/Dockerfile.workspace
  working_dir: /workspace
  restart: unless-stopped

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${FLOW2PRINT_POSTGRES_DB:-flow2print}
      POSTGRES_USER: ${FLOW2PRINT_POSTGRES_USER:-flow2print}
      POSTGRES_PASSWORD: ${FLOW2PRINT_POSTGRES_PASSWORD:-flow2print}
    ports:
      - "${FLOW2PRINT_POSTGRES_PORT_PUBLIC:-55435}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FLOW2PRINT_POSTGRES_USER:-flow2print} -d ${FLOW2PRINT_POSTGRES_DB:-flow2print}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${FLOW2PRINT_REDIS_PORT:-6381}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:4-management-alpine
    ports:
      - "${FLOW2PRINT_RABBITMQ_PORT:-5673}:5672"
      - "${FLOW2PRINT_RABBITMQ_MANAGEMENT_PORT:-15673}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${FLOW2PRINT_MINIO_USER:-flow2print}
      MINIO_ROOT_PASSWORD: ${FLOW2PRINT_MINIO_PASSWORD:-flow2print}
    ports:
      - "${FLOW2PRINT_MINIO_PORT:-9100}:9000"
      - "${FLOW2PRINT_MINIO_CONSOLE_PORT:-9101}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 20

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${FLOW2PRINT_MAILPIT_SMTP_PORT:-1125}:1025"
      - "${FLOW2PRINT_MAILPIT_UI_PORT:-8125}:8025"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${FLOW2PRINT_PROMETHEUS_PORT:-9091}:9090"
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    ports:
      - "${FLOW2PRINT_GRAFANA_PORT:-3031}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${FLOW2PRINT_GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${FLOW2PRINT_GRAFANA_PASSWORD:-admin}

  db-migrate:
    <<: *node-service
    command:
      - bash
      - -lc
      - |
        pnpm --filter @flow2print/database db:migrate:deploy
    environment:
      DATABASE_URL: postgresql://${FLOW2PRINT_POSTGRES_USER:-flow2print}:${FLOW2PRINT_POSTGRES_PASSWORD:-flow2print}@postgres:5432/${FLOW2PRINT_POSTGRES_DB:-flow2print}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  edge-api:
    <<: *node-service
    command:
      - bash
      - -lc
      - |
        pnpm --filter @flow2print/rendering-engine build && \
        pnpm --filter @flow2print/database build && \
        pnpm --filter @flow2print/runtime-store build && \
        pnpm --filter @flow2print/edge-api build && \
        node apps/edge-api/dist/main.nest.js
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${FLOW2PRINT_POSTGRES_USER:-flow2print}:${FLOW2PRINT_POSTGRES_PASSWORD:-flow2print}@postgres:5432/${FLOW2PRINT_POSTGRES_DB:-flow2print}?schema=public
      FLOW2PRINT_POSTGRES_HOST: postgres
      FLOW2PRINT_POSTGRES_PORT: 5432
      FLOW2PRINT_POSTGRES_DB: ${FLOW2PRINT_POSTGRES_DB:-flow2print}
      FLOW2PRINT_POSTGRES_USER: ${FLOW2PRINT_POSTGRES_USER:-flow2print}
      FLOW2PRINT_POSTGRES_PASSWORD: ${FLOW2PRINT_POSTGRES_PASSWORD:-flow2print}
      FLOW2PRINT_REDIS_HOST: redis
      FLOW2PRINT_REDIS_PORT: 6379
      FLOW2PRINT_RABBITMQ_HOST: rabbitmq
      FLOW2PRINT_RABBITMQ_PORT: 5672
      FLOW2PRINT_DATA_DIR: /workspace/.docker-runtime
      FLOW2PRINT_STORAGE_DIR: /workspace/.docker-object-storage
      DESIGNER_APP_URL: http://${FLOW2PRINT_PUBLIC_HOST:-127.0.0.1}:${FLOW2PRINT_DESIGNER_PORT_PUBLIC:-5173}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - app-runtime-data:/workspace/.docker-runtime
      - app-object-storage:/workspace/.docker-object-storage
    ports:
      - "${FLOW2PRINT_EDGE_API_PORT_PUBLIC:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20

  designer-web:
    <<: *node-service
    command:
      - bash
      - -lc
      - |
        pnpm --filter @flow2print/designer-web exec vite --host 0.0.0.0 --port 5173
    environment:
      VITE_FLOW2PRINT_API_URL: http://${FLOW2PRINT_PUBLIC_HOST:-127.0.0.1}:${FLOW2PRINT_EDGE_API_PORT_PUBLIC:-3000}
      VITE_FLOW2PRINT_DESIGNER_URL: http://${FLOW2PRINT_PUBLIC_HOST:-127.0.0.1}:${FLOW2PRINT_DESIGNER_PORT_PUBLIC:-5173}
      VITE_FLOW2PRINT_RETURN_URL: /flow2print/return
    depends_on:
      edge-api:
        condition: service_healthy
    ports:
      - "${FLOW2PRINT_DESIGNER_PORT_PUBLIC:-5173}:5173"

  portal-web:
    <<: *node-service
    command:
      - bash
      - -lc
      - |
        pnpm --filter @flow2print/portal-web exec vite --host 0.0.0.0 --port 5174
    environment:
      VITE_FLOW2PRINT_API_URL: http://${FLOW2PRINT_PUBLIC_HOST:-127.0.0.1}:${FLOW2PRINT_EDGE_API_PORT_PUBLIC:-3000}
      VITE_FLOW2PRINT_DESIGNER_URL: http://${FLOW2PRINT_PUBLIC_HOST:-127.0.0.1}:${FLOW2PRINT_DESIGNER_PORT_PUBLIC:-5173}
      VITE_FLOW2PRINT_RETURN_URL: /flow2print/return
    depends_on:
      edge-api:
        condition: service_healthy
    ports:
      - "${FLOW2PRINT_PORTAL_PORT_PUBLIC:-5174}:5174"

  admin-portal:
    <<: *node-service
    command:
      - bash
      - -lc
      - |
        pnpm --filter @flow2print/admin-portal exec vite --host 0.0.0.0 --port 5177
    environment:
      VITE_FLOW2PRINT_API_URL: http://${FLOW2PRINT_PUBLIC_HOST:-127.0.0.1}:${FLOW2PRINT_EDGE_API_PORT_PUBLIC:-3000}
      VITE_FLOW2PRINT_DESIGNER_URL: http://${FLOW2PRINT_PUBLIC_HOST:-127.0.0.1}:${FLOW2PRINT_DESIGNER_PORT_PUBLIC:-5173}
    depends_on:
      edge-api:
        condition: service_healthy
    ports:
      - "${FLOW2PRINT_ADMIN_PORT_PUBLIC:-5177}:5177"

volumes:
  postgres-data:
  minio-data:
  app-runtime-data:
  app-object-storage:
